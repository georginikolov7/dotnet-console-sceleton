services:
  db:
    image: postgres:latest
    container_name: hubdb
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql
  app:
    build:
      context: .
      dockerfile: HubbersApp/HubbersApp.Cli/Dockerfile
    container_name: hubbers_console_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__PostgresConnection: "Host=${DB_HOST};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"

volumes:
  db-data: